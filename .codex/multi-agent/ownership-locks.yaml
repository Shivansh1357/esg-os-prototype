  - id: global-agents-md
    path_glob: AGENTS.md
    owner: architecture
    reviewers: [orchestrator, qa]
    precedence: 97

  - id: lower-agents-md
    path_glob: agents.md
    owner: architecture
    reviewers: [orchestrator, qa]
    precedence: 97

  - id: docs-artifacts
    path_glob: docs/**
    owner: product-owner
    reviewers: [qa, architecture]
    precedence: 75

  - id: fallback-strict
    path_glob: "**"
    owner: orchestrator
    reviewers: [architecture]
    precedence: 1
