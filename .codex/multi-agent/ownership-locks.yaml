version: 1
resolution:
  algorithm: longest_path_match_then_highest_precedence
  deny_on_unowned_write: true
  require_owner_agent_for_cross_domain: true

locks:
  - id: frontend-all
    path_glob: apps/web/**
    owner: frontend
    reviewers: [qa, architecture]
    precedence: 80

  - id: ai-all
    path_glob: apps/ai/**
    owner: ai
    reviewers: [qa, security]
    precedence: 80

  - id: compliance-api
    path_glob: apps/api/src/compliance/**
    owner: compliance
    reviewers: [backend, qa, security]
    precedence: 95

  - id: reporting-api
    path_glob: apps/api/src/reports/**
    owner: reporting
    reviewers: [backend, qa, architecture]
    precedence: 95

  - id: auditor-api
    path_glob: apps/api/src/auditor/**
    owner: reporting
    reviewers: [backend, qa, architecture]
    precedence: 95

  - id: backend-api-fallback
    path_glob: apps/api/src/**
    owner: backend
    reviewers: [qa]
    precedence: 70

  - id: compliance-sql-deploy-03
    path_glob: sql/deploy/03*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-deploy-04
    path_glob: sql/deploy/04*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
