  - id: sql-fallback
    path_glob: sql/**
    owner: backend
    reviewers: [security]
    precedence: 60

  - id: worker-runtime
    path_glob: jobs/worker/**
    owner: backend
    reviewers: [devops, qa]
    precedence: 90

  - id: docker-runtime
    path_glob: docker/**
    owner: devops
    reviewers: [security]
    precedence: 90

  - id: github-workflows
    path_glob: .github/workflows/**
    owner: devops
    reviewers: [security, qa]
