    precedence: 100

  - id: governance-scripts
    path_glob: scripts/**
    owner: devops
    reviewers: [qa, security]
    precedence: 88

  - id: root-package-json
    path_glob: package.json
    owner: devops
    reviewers: [qa]
    precedence: 88

  - id: root-lockfile
    path_glob: pnpm-lock.yaml
    owner: devops
    reviewers: [qa]
