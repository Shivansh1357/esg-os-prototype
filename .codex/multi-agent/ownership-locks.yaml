    path_glob: sql/deploy/09*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-revert-03
    path_glob: sql/revert/03*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-revert-04
    path_glob: sql/revert/04*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-revert-09
    path_glob: sql/revert/09*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-verify-03
    path_glob: sql/verify/03*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-verify-04
    path_glob: sql/verify/04*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98
  - id: compliance-sql-verify-09
    path_glob: sql/verify/09*.sql
    owner: compliance
    reviewers: [backend, security]
    precedence: 98

  - id: reporting-sql-deploy-05
    path_glob: sql/deploy/05*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-deploy-07
    path_glob: sql/deploy/07*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-deploy-10
    path_glob: sql/deploy/10*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-deploy-11
    path_glob: sql/deploy/11*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-revert-05
    path_glob: sql/revert/05*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-revert-07
    path_glob: sql/revert/07*.sql
    owner: reporting
    reviewers: [backend, architecture]
    precedence: 98
  - id: reporting-sql-revert-10
