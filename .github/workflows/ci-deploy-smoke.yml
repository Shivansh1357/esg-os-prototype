name: CI Deploy Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_FILE: docker/compose.smoke.yml
      COMPOSE_PROJECT_NAME: deploysmoke
      JWT_SECRET: test-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API and Web images
        run: docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" build api web

      - name: Start Postgres
        run: docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" up -d db

      - name: Wait for Postgres
        run: |
          for i in {1..40}; do
            if docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" exec -T db pg_isready -U postgres -d esg-os; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Deploy DB migrations
        run: |
          docker run --rm \
            --network "${COMPOSE_PROJECT_NAME}_default" \
            -e PGPASSWORD=esg \
            -v "$PWD/sql:/work/sql" \
            -w /work/sql \
            sqitch/sqitch deploy db:pg://postgres:esg@db:5432/esg-os

      - name: Verify DB migrations
        run: |
          docker run --rm \
            --network "${COMPOSE_PROJECT_NAME}_default" \
            -e PGPASSWORD=esg \
            -v "$PWD/sql:/work/sql" \
            -w /work/sql \
            sqitch/sqitch verify db:pg://postgres:esg@db:5432/esg-os

      - name: Start API and Web
        run: docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" up -d api web

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" logs api
          exit 1

      - name: Wait for Web health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Web health check failed"
          docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" logs web
          exit 1

      - name: Smoke checks
        run: |
          curl -fsS http://localhost:3001/metrics >/dev/null
          curl -fsS http://localhost:3001/health >/dev/null

          status_no_auth=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/reports)
          if [ "$status_no_auth" != "401" ]; then
            echo "Expected 401 without token, got $status_no_auth"
            exit 1
          fi

          token=$(node -e "const crypto=require('crypto');const enc=o=>Buffer.from(JSON.stringify(o)).toString('base64url');const h=enc({alg:'HS256',typ:'JWT'});const p=enc({tenantId:'11111111-1111-1111-1111-111111111111',sub:'22222222-2222-2222-2222-222222222222',role:'ADMIN',iat:Math.floor(Date.now()/1000),exp:Math.floor(Date.now()/1000)+3600});const d=h+'.'+p;const s=crypto.createHmac('sha256',process.env.JWT_SECRET).update(d).digest('base64url');process.stdout.write(d+'.'+s);")
          status_with_auth=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $token" http://localhost:3001/reports)
          if [ "$status_with_auth" != "200" ]; then
            echo "Expected 200 with token, got $status_with_auth"
            exit 1
          fi

      - name: Stop containers
        if: always()
        run: docker compose -f "$COMPOSE_FILE" -p "$COMPOSE_PROJECT_NAME" down -v --remove-orphans

      - name: Verify clean shutdown
        if: always()
        run: |
          if [ -n "$(docker ps --filter "name=${COMPOSE_PROJECT_NAME}" --format '{{.Names}}')" ]; then
            echo "Some smoke containers are still running"
            docker ps --filter "name=${COMPOSE_PROJECT_NAME}" --format '{{.Names}}'
            exit 1
          fi
