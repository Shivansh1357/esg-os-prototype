name: Governance Enforcement

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
      - ready_for_review

jobs:
  governance:
    name: Governance Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run governance check
        shell: bash
        run: |
          set -euo pipefail
          pnpm governance:check \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --head-ref "${{ github.event.pull_request.head.ref }}" \
            | tee governance-result.json

      - name: Upload governance result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-result
          path: governance-result.json
