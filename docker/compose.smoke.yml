services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: esg
      POSTGRES_DB: esg-os
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esg-os"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:esg@db:5432/esg-os
      PORT: 3001
      AUTH_MODE: jwt
      JWT_SECRET: test-jwt-secret
      SUPPLIER_TOKEN_SECRET: supplier-smoke-secret
      PUBLIC_ORIGIN: http://localhost:3000
      S3_BUCKET: mock-bucket
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_TENANT_ID: 11111111-1111-1111-1111-111111111111
      NEXT_PUBLIC_USER_ID: 22222222-2222-2222-2222-222222222222
      NEXT_PUBLIC_AUTH_TOKEN: ""
      NEXT_PUBLIC_DEFAULT_FACTOR_SET_ID: 11111111-1111-1111-1111-111111111111
      NEXT_PUBLIC_FACTOR_SET_LABEL: Default
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
